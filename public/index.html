<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kovanica Rudnik</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="balance-container">
                <span class="label">💰 Balans</span>
                <div class="balance-row">
                    <span class="balance" id="balance">0.0000</span>
                    <span class="currency">KVNC</span>
                </div>
            </div>
        </div>

        <div class="rank-container">
            <span class="rank-badge" id="rankBadge">⛏️ Novi rudar</span>
        </div>

        <div class="stats-row">
            <div class="stat-item">
                <span class="stat-label">👆 Ukupno</span>
                <span class="stat-value" id="totalClicks">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">📅 Danas</span>
                <span class="stat-value" id="dailyClicks">0 / 10000</span>
            </div>
        </div>

        <div class="mine-area">
            <div class="pickaxe-wrapper">
                <div class="pickaxe" id="pickaxe">⛏️</div>
            </div>
            <button class="mine-btn" id="mineBtn">
                <span class="btn-text">⛏️ RUDARI!</span>
                <span class="btn-sub" id="rewardSub">+1 KVNC</span>
            </button>
            <div class="click-counter" id="clickCounter">+1</div>
        </div>

        <div class="footer">
            <span>💎 Kovanica v2.0</span>
            <span>⚡ 2026</span>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
